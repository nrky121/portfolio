name: Update Production Alias

on:
  push:
    branches: [main]

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Wait for deployment and update alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "Waiting for Vercel to start deployment..."
          sleep 30

          for i in $(seq 1 20); do
            RESPONSE=$(curl -sf \
              "https://api.vercel.com/v6/deployments?app=ryan-ngai&limit=1&target=production&teamSlug=ryanngai" \
              -H "Authorization: Bearer $VERCEL_TOKEN")

            STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // "UNKNOWN"')
            URL=$(echo "$RESPONSE" | jq -r '.deployments[0].url // ""')

            echo "Attempt $i: state=$STATE"

            if [ "$STATE" = "READY" ]; then
              echo "Deployment ready: https://$URL"
              vercel alias set "https://$URL" ryan-ngai.vercel.app \
                --token=$VERCEL_TOKEN --scope=ryanngai
              echo "✓ ryan-ngai.vercel.app updated"
              exit 0
            fi

            sleep 15
          done

          echo "Timed out waiting for deployment"
          exit 1
